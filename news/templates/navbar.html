{% load static %}
<nav class="navbar navbar-expand-lg sticky-top" style="
    background: rgba(10, 25, 47, 0.95);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    padding: 0.75rem 0;
">
    <div class="container">
        <!-- Brand with refined typography -->
        <a class="navbar-brand d-flex align-items-center" href="{% url 'news:news_list' %}" style="font-weight: 700; font-size: 1.6rem; letter-spacing: -0.02em;">
            <img src="{% static 'images/logo.jpg' %}" alt="নবকাল নিউজ" width="44" height="44" class="me-2 rounded-2" style="object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));">
            <span style="background: linear-gradient(135deg, #ffffff 0%, #e0e7ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">নবকাল নিউজ</span>
        </a>

        <!-- Toggler with improved animation -->
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
                style="padding: 0.5rem; color: white; background: rgba(255,255,255,0.1); border-radius: 8px;"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon" style="filter: brightness(0) invert(1);"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarNav">
            <!-- Navigation links with hover effects -->
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-1">
                {% for category in categories|slice:":7" %}
                <li class="nav-item">
                    <a class="nav-link px-3 py-2 rounded-3 fw-medium" href="{% url 'news:news_list_by_category' category.slug %}" 
                       style="color: rgba(255,255,255,0.85); transition: all 0.2s ease; font-size: 0.95rem;"
                       onmouseover="this.style.backgroundColor='rgba(255,255,255,0.1)'; this.style.color='white';"
                       onmouseout="this.style.backgroundColor='transparent'; this.style.color='rgba(255,255,255,0.85)';">
                        {{ category.name }}
                    </a>
                </li>
                {% endfor %}
                {% if categories|length > 7 %}
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle px-3 py-2 rounded-3" href="#" id="moreCategoriesDropdown" role="button" 
                       data-bs-toggle="dropdown" aria-expanded="false"
                       style="color: rgba(255,255,255,0.85); font-size: 0.95rem;">
                        More <i class="fas fa-chevron-down ms-1" style="font-size: 0.7rem;"></i>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-dark bg-dark border-0 shadow-lg" style="backdrop-filter: blur(10px); background: rgba(20, 30, 50, 0.95) !important; border-radius: 12px; margin-top: 8px;">
                        {% for category in categories|slice:"7:" %}
                        <li><a class="dropdown-item py-2" href="{% url 'news:news_list_by_category' category.slug %}" style="color: rgba(255,255,255,0.8);">{{ category.name }}</a></li>
                        {% endfor %}
                    </ul>
                </li>
                {% endif %}
            </ul>

            <!-- Enhanced search form with real-time search icon -->
            <form class="d-flex position-relative" action="{% url 'news:search' %}" method="get" style="min-width: 260px;" id="searchForm">
                <div class="input-group">
                    <input class="form-control border-0" type="search" name="query" placeholder="Search news..." value="{{ query }}" required
                           style="background: rgba(255,255,255,0.1); border-radius: 40px 0 0 40px; padding: 0.6rem 1.2rem; color: white; backdrop-filter: blur(5px);"
                           onfocus="this.style.background='rgba(255,255,255,0.15)';"
                           onblur="this.style.background='rgba(255,255,255,0.1)';">
                    <button class="btn" type="submit" 
                            style="background: rgba(255,255,255,0.15); border-radius: 0 40px 40px 0; padding: 0.6rem 1.2rem; border: none; color: rgba(255,255,255,0.9); transition: all 0.2s;"
                            onmouseover="this.style.background='rgba(255,255,255,0.25)';"
                            onmouseout="this.style.background='rgba(255,255,255,0.15)';">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</nav>


<style>
    /* Smooth navbar transition */
    .navbar {
        transition: all 0.3s ease;
    }
    
    /* Dropdown animation */
    .dropdown-menu {
        display: block;
        opacity: 0;
        visibility: hidden;
        transform: translateY(-10px);
        transition: all 0.2s ease-in-out;
        pointer-events: none;
    }
    
    .dropdown.show .dropdown-menu,
    .nav-item.dropdown:hover .dropdown-menu {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
        pointer-events: all;
    }
    
    /* Active link indicator */
    .nav-link.active {
        background: rgba(255,255,255,0.15) !important;
        color: white !important;
    }
    
    /* Search input placeholder color */
    .form-control::placeholder {
        color: rgba(255,255,255,0.5);
        font-weight: 300;
    }
    
    /* Responsive adjustments */
    @media (max-width: 991.98px) {
        .navbar-collapse {
            background: rgba(10, 25, 47, 0.98);
            backdrop-filter: blur(10px);
            padding: 1rem;
            border-radius: 16px;
            margin-top: 1rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .nav-link {
            padding: 0.75rem 1rem !important;
            border-radius: 8px !important;
        }
        
        .nav-link:hover {
            background: rgba(255,255,255,0.05) !important;
        }
        
        form {
            margin-top: 0.75rem;
        }
        
        .dropdown-menu {
            background: rgba(30, 40, 60, 0.95) !important;
            border: 1px solid rgba(255,255,255,0.05);
        }
    }
</style>

<!-- JavaScript for active link highlighting -->
<script>
    (function() {
        // Highlight current active link based on URL
        const currentLocation = window.location.pathname;
        const navLinks = document.querySelectorAll('.nav-link');
        
        navLinks.forEach(link => {
            const href = link.getAttribute('href');
            if (href && currentLocation.startsWith(href) && href !== '/') {
                link.classList.add('active');
            } else if (href === '/' && currentLocation === '/') {
                link.classList.add('active');
            }
        });
        
        // Add scroll effect to navbar
        window.addEventListener('scroll', function() {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.style.background = 'rgba(5, 15, 30, 0.98)';
                navbar.style.backdropFilter = 'blur(10px)';
                navbar.style.borderBottom = '1px solid rgba(255,255,255,0.02)';
            } else {
                navbar.style.background = 'rgba(10, 25, 47, 0.95)';
                navbar.style.backdropFilter = 'blur(10px)';
                navbar.style.borderBottom = '1px solid rgba(255,255,255,0.08)';
            }
        });
    })();
</script>
