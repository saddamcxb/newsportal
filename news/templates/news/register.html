{% extends 'base.html' %}
{% load static %}

{% block title %}রেজিস্টার - নিউজপোর্টাল{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-header bg-danger text-white text-center">
                    <h4 class="mb-0"><i class="fas fa-user-plus"></i> রেজিস্টার</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="username" class="form-label">ইউজারনেম</label>
                            <input type="text" name="username" id="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">ইমেইল</label>
                            <input type="email" name="email" id="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">পাসওয়ার্ড</label>
                            <input type="password" name="password" id="password" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="confirm_password" class="form-label">পাসওয়ার্ড নিশ্চিত করুন</label>
                            <input type="password" name="confirm_password" id="confirm_password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-danger w-100">রেজিস্টার</button>
                    </form>
                    <hr>
                    <p class="text-center mb-0">
                        ইতিমধ্যে অ্যাকাউন্ট আছে? <a href="{% url 'news:login' %}">লগইন করুন</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
