{% extends 'base.html' %}
{% load static %}

{% block title %}লগইন - নিউজপোর্টাল{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-header bg-danger text-white text-center">
                    <h4 class="mb-0"><i class="fas fa-sign-in-alt"></i> লগইন</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="username" class="form-label">ইউজারনেম</label>
                            <input type="text" name="username" id="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">পাসওয়ার্ড</label>
                            <input type="password" name="password" id="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-danger w-100">লগইন</button>
                    </form>
                    <hr>
                    <p class="text-center mb-0">
                        অ্যাকাউন্ট নেই? <a href="{% url 'news:register' %}">রেজিস্টার করুন</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
